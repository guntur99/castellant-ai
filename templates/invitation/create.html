{% extends "site_base.html" %}

{% block site_content %}
<section class="section" style="padding: 120px 0;">
    <div class="container" style="max-width: 800px;">
        <h1 class="script" style="font-size: 3rem; color: var(--color-accent-red);">Buat Undangan Digital</h1>
        <p class="serif">Isi detail pernikahan Anda di bawah ini</p>

        <form action="/api/invitation" method="POST" enctype="multipart/form-data" class="paper-bg" style="padding: 2rem; border-radius: 20px; box-shadow: var(--shadow-medium); text-align: left; margin-top: 2rem;">
            <!-- Short Name / Slug -->
            <div style="margin-bottom: 2rem;">
                <h3 class="serif" style="color: var(--color-accent-red);">1. Informasi Dasar</h3>
                <div style="margin-bottom: 1rem;">
                    <label class="serif bold">Nama Pendek Pasangan (Contoh: Romeo & Julia)</label>
                    <input type="text" name="couple_name_short" required style="width: 100%; padding: 0.8rem; border-radius: 10px; border: 1px solid #ddd;">
                </div>
                <div style="margin-bottom: 1rem;">
                    <label class="serif bold">URL Custom / Slug (Contoh: romeo-julia)</label>
                    <input type="text" name="slug" required style="width: 100%; padding: 0.8rem; border-radius: 10px; border: 1px solid #ddd;">
                </div>
                <div style="margin-bottom: 1rem;">
                    <label class="serif bold">Tanggal Pernikahan (Teks, contoh: 12 Desember 2026)</label>
                    <input type="text" name="event_date" required style="width: 100%; padding: 0.8rem; border-radius: 10px; border: 1px solid #ddd;">
                </div>
            </div>

            <!-- Bride Details -->
            <div style="margin-bottom: 2rem;">
                <h3 class="serif" style="color: var(--color-accent-red);">2. Detail Mempela Wanita</h3>
                <input type="text" name="bride_name" placeholder="Nama Panggilan" required style="width: 100%; padding: 0.8rem; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 0.5rem;">
                <input type="text" name="bride_full_name" placeholder="Nama Lengkap" required style="width: 100%; padding: 0.8rem; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 0.5rem;">
                <input type="text" name="bride_father" placeholder="Nama Ayah" required style="width: 100%; padding: 0.8rem; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 0.5rem;">
                <input type="text" name="bride_mother" placeholder="Nama Ibu" required style="width: 100%; padding: 0.8rem; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 0.5rem;">
                <label class="serif">Foto Mempela Wanita</label>
                <input type="file" name="bride_photo" accept="image/*" style="width: 100%; margin-top: 0.5rem;">
            </div>

            <!-- Groom Details -->
            <div style="margin-bottom: 2rem;">
                <h3 class="serif" style="color: var(--color-accent-red);">3. Detail Mempelai Pria</h3>
                <input type="text" name="groom_name" placeholder="Nama Panggilan" required style="width: 100%; padding: 0.8rem; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 0.5rem;">
                <input type="text" name="groom_full_name" placeholder="Nama Lengkap" required style="width: 100%; padding: 0.8rem; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 0.5rem;">
                <input type="text" name="groom_father" placeholder="Nama Ayah" required style="width: 100%; padding: 0.8rem; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 0.5rem;">
                <input type="text" name="groom_mother" placeholder="Nama Ibu" required style="width: 100%; padding: 0.8rem; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 0.5rem;">
                <label class="serif">Foto Mempelai Pria</label>
                <input type="file" name="groom_photo" accept="image/*" style="width: 100%; margin-top: 0.5rem;">
            </div>

            <!-- Ceremony & Reception -->
            <div style="margin-bottom: 2rem;">
                <h3 class="serif" style="color: var(--color-accent-red);">4. Lokasi & Waktu Acara</h3>
                <h4 class="serif">Akad / Pemberkatan</h4>
                <input type="text" name="ceremony_venue" placeholder="Nama Tempat" style="width: 100%; padding: 0.8rem; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 0.5rem;">
                <input type="text" name="ceremony_address" placeholder="Alamat Lengkap" style="width: 100%; padding: 0.8rem; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 0.5rem;">
                
                <h4 class="serif">Resepsi</h4>
                <input type="text" name="reception_venue" placeholder="Nama Tempat" style="width: 100%; padding: 0.8rem; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 0.5rem;">
                <input type="text" name="reception_address" placeholder="Alamat Lengkap" style="width: 100%; padding: 0.8rem; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 0.5rem;">
            </div>

            <button type="submit" class="btn" style="width: 100%; padding: 1rem; font-size: 1.2rem;">Konfirmasi & Buat Undangan</button>
        </form>
    </div>
</section>
{% endblock %}
