<!DOCTYPE html>
<html lang="id" prefix="og: https://ogp.me/ns#">

<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4E2RBRGLSE"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-4E2RBRGLSE');
    </script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Castellant — Undangan Digital Pernikahan Premium & Elegan{% endblock %}</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/static/img/favicon.png">
    <link rel="apple-touch-icon" href="/static/img/favicon.png">
    <meta name="theme-color" content="#D43030">

    <!-- Primary SEO Meta -->
    <meta name="description"
        content="{% block meta_description %}Castellant — platform undangan digital pernikahan premium berbasis AI. Desain eksklusif, RSVP otomatis, AI Concierge, dan link abadi. Mulai dari Rp 50.000.{% endblock %}">
    <meta name="keywords"
        content="{% block meta_keywords %}undangan digital pernikahan, undangan online premium, wedding invitation digital Indonesia, undangan nikah online, castellant, undangan AI, RSVP digital, template undangan eksklusif{% endblock %}">
    <meta name="author" content="Castellant">
    <meta name="robots" content="{% block meta_robots %}index, follow{% endblock %}">
    <meta name="googlebot" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">
    <link rel="canonical" href="{% block canonical %}https://castellant.com{% endblock %}">
    <link rel="alternate" hreflang="id" href="{% block hreflang_id %}https://castellant.com{% endblock %}">
    <link rel="alternate" hreflang="x-default" href="{% block hreflang_default %}https://castellant.com{% endblock %}">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="{% block og_type %}website{% endblock %}">
    <meta property="og:site_name" content="Castellant">
    <meta property="og:locale" content="id_ID">
    <meta property="og:url" content="{% block og_url %}https://castellant.com{% endblock %}">
    <meta property="og:title"
        content="{% block og_title %}Castellant — Undangan Digital Pernikahan Premium{% endblock %}">
    <meta property="og:description"
        content="{% block og_description %}Wujudkan undangan pernikahan impianmu dengan Castellant. Desain eksklusif, AI Concierge, RSVP digital, dan link abadi. Mulai Rp 50.000.{% endblock %}">
    <meta property="og:image"
        content="{% block og_image %}https://castellant.com/static/img/caiktok_preview.png{% endblock %}">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="Castellant - Undangan Digital Premium">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@castellant">
    <meta name="twitter:url" content="{% block twitter_url %}https://castellant.com{% endblock %}">
    <meta name="twitter:title"
        content="{% block twitter_title %}Castellant — Undangan Digital Pernikahan Premium{% endblock %}">
    <meta name="twitter:description"
        content="{% block twitter_description %}Wujudkan undangan pernikahan impianmu dengan Castellant. Desain eksklusif, AI Concierge, RSVP digital, dan link abadi.{% endblock %}">
    <meta name="twitter:image"
        content="{% block twitter_image %}https://castellant.com/static/img/caiktok_preview.png{% endblock %}">

    <!-- Resource Hints -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="dns-prefetch" href="https://unpkg.com">

    <!-- Structured Data (JSON-LD) -->
    {% block structured_data %}{% endblock %}

    <link rel="stylesheet" href="/static/css/theme.css">
    <link rel="stylesheet" href="/static/css/main.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    {% block head %}{% endblock %}
</head>

<body class="{% block body_class %}{% endblock %}">
    <div class="{% block container_class %}{% endblock %}">
        <main id="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>

    <div id="audio-container" style="display: none;">
        <audio id="bg-music" loop>
            {% block audio_source %}
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
            {% endblock %}
        </audio>
    </div>

    {% block scripts %}{% endblock %}
</body>

</html>
