<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Castellant - Undangan Digital Premium Modern{% endblock %}</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/static/img/favicon.png">
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="{% block meta_description %}Buat undangan digital pernikahan premium, elegan, dan interaktif dengan mudah di Castellant. Berbagai pilihan template eksklusif.{% endblock %}">
    <meta name="keywords" content="undangan digital, digital invitation, undangan pernikahan, wedding invitation, castellant, undangan online">
    <meta name="author" content="Castellant">
    <link rel="canonical" href="{% block canonical %}https://castellant.id{% endblock %}">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="{% block og_url %}https://castellant.id{% endblock %}">
    <meta property="og:title" content="{% block og_title %}Castellant - Digital Invitation{% endblock %}">
    <meta property="og:description" content="{% block og_description %}Buat momen spesialmu tak terlupakan dengan undangan digital premium dari Castellant.{% endblock %}">
    <meta property="og:image" content="{% block og_image %}https://castellant.id/static/img/vintage_preview.png{% endblock %}">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="{% block twitter_url %}https://castellant.id{% endblock %}">
    <meta property="twitter:title" content="{% block twitter_title %}Castellant - Digital Invitation{% endblock %}">
    <meta property="twitter:description" content="{% block twitter_description %}Buat momen spesialmu tak terlupakan dengan undangan digital premium dari Castellant.{% endblock %}">
    <meta property="twitter:image" content="{% block twitter_image %}https://castellant.id/static/img/vintage_preview.png{% endblock %}">

    <link rel="stylesheet" href="/static/css/theme.css">
    <link rel="stylesheet" href="/static/css/main.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    {% block head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
    <div class="{% block container_class %}{% endblock %}">
        <main id="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>

    <div id="audio-container" style="display: none;">
        <audio id="bg-music" loop>
            {% block audio_source %}
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
            {% endblock %}
        </audio>
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
