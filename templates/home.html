{% extends "base.html" %}

{% block content %}
<section class="section">
    <div class="container animate__animated animate__fadeIn">
        <h1 class="script" style="font-size: 4rem; color: var(--color-accent-red);">Castellant</h1>
        <p class="serif" style="font-size: 1.2rem; margin-top: -1rem; letter-spacing: 2px;">PREMIUM DIGITAL INVITATIONS</p>
        
        <div style="margin-top: 2rem;">
            <a href="/auth/google" class="btn" style="background: white; color: var(--color-text-primary); border: 1px solid #ddd; display: inline-flex; align-items: center; gap: 10px;">
                <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="20" height="20" alt="Google">
                Login with Google to Start
            </a>
        </div>
        
        <div style="margin-top: var(--spacing-lg);">
            <h2 class="serif">Our Templates</h2>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: var(--spacing-md); margin-top: var(--spacing-md);">
                <div style="background: white; padding: var(--spacing-md); border-radius: 20px; box-shadow: var(--shadow-soft);">
                    <div class="arch-frame" style="height: 300px; overflow: hidden; position: relative;">
                        <img src="/static/img/vintage_preview.png" alt="Vintage Archival Preview" style="width: 100%; height: 100%; object-fit: cover; object-position: top;">
                        <div style="position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.5)); padding: 1rem; color: white;">
                            <span class="serif">Vintage Archival</span>
                        </div>
                    </div>
                    <h3 class="serif" style="margin-top: var(--spacing-sm);">Vintage Archival</h3>
                    <p style="font-size: 0.9rem; color: var(--color-text-muted);">Classical elegance with arched motifs.</p>
                    <a href="/invitation/sample" class="btn" style="margin-top: var(--spacing-sm); width: 100%;">View Sample</a>
                </div>
                
                <div style="background: white; padding: var(--spacing-md); border-radius: 20px; box-shadow: var(--shadow-soft); opacity: 0.6;">
                    <div style="height: 300px; background: #eee; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #999;">Modern Minimalist</div>
                    <h3 class="serif" style="margin-top: var(--spacing-sm);">Coming Soon</h3>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
